name: Cloud Windows OpenRV Build

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
    - name: Checkout OpenRV Source Code
      uses: actions/checkout@v4
      with:
        repository: 'AcademySoftwareFoundation/OpenRV'
        ref: 'main'
        submodules: recursive

    - name: Calculate Submodule Fingerprint
      id: submodule-fingerprint
      shell: bash
      run: |
        echo "hash=${{ hashFiles('.gitmodules', '**/CMakeLists.txt') }}" >> $GITHUB_OUTPUT

    - name: Cache Build Dependencies
      uses: actions/cache@v4
      with:
        path: |
          _build
          ~/.cache
        key: ${{ runner.os }}-openrv-${{ steps.submodule-fingerprint.outputs.hash }}
        restore-keys: |
          ${{ runner.os }}-openrv-

    # DOWNGRADED TO PYTHON 3.10 TO PREVENT CYTHON/WHEEL COMPILATION FAILURES
    - name: Setup Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Perl
      uses: shogo82148/actions-setup-perl@v1
      with:
        perl-version: '5.38'

    - name: Setup CMake
      uses: lukka/get-cmake@latest

    - name: Set Environment Paths
      shell: bash
      run: |
        echo "RV_DEPS_WIN_PERL_ROOT=C:\strawberry\perl\bin" >> $GITHUB_ENV

    - name: Execute Bootstrapping & Compilation
      shell: bash
      run: |
        echo "=== Installing Python Build Tools ==="
        python -m pip install --upgrade pip
        python -m pip install "setuptools<70.0.0" "wheel"
        python -m pip install -r requirements.txt
        python -m pip install conan==1.60.0 aqtinstall

        echo "=== Installing Qt 6.5.0 Manually via AQT ==="
        # USES 6.5.0 TO BYPASS BROKEN COMMERCIAL METADATA MIRRORS
        python -m aqt install-qt windows desktop 6.5.0 win64_msvc2022 --outputdir $(pwd)/qt6

        echo "=== Initializing Conan Profiles ==="
        conan profile new default --detect
        conan profile update settings.compiler="Visual Studio" default
        conan profile update settings.compiler.version="17" default
        conan profile update settings.compiler.runtime="MD" default

        echo "=== Exporting Internal Conan Packages ==="
        conan export openrvcore-conanfile.py openrvcore/1.0.0@aswf/stable

        echo "=== Running CMake Configuration ==="
        cmake -B _build -G "Visual Studio 17 2022" -A x64 \
          -DCMAKE_BUILD_TYPE=Release \
          -DRV_DEPS_QT_LOCATION="$(pwd)/qt6/6.5.0/msvc2022_64"

        echo "=== Building Project ==="
        cmake --build _build --config Release --parallel 4

    - name: Upload Finished Executable Build
      uses: actions/upload-artifact@v4
      with:
        name: OpenRV-Windows-CloudBuild
        path: _build/stage/app/bin/
