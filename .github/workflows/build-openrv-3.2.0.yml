name: Build OpenRV 3.2.0 Windows x64

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 360

    steps:
      - name: Checkout build repository
        uses: actions/checkout@v4

      - name: Enable long Git paths
        shell: pwsh
        run: git config --global core.longpaths true

      - name: Clone official OpenRV 3.2.0
        shell: pwsh
        run: |
          git clone --recursive --branch v3.2.0 --depth 1 https://github.com/AcademySoftwareFoundation/OpenRV.git OpenRV
          cd OpenRV
          git submodule update --init --recursive

      - name: Install build tools
        shell: pwsh
        run: |
          choco install ninja strawberryperl nasm -y
          python -m pip install --upgrade pip
          python -m pip install aqtinstall
          python -m aqt install-qt windows desktop 5.15.2 win64_msvc2019_64 -O C:\Qt

      - name: Configure OpenRV
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cd /d "%GITHUB_WORKSPACE%\OpenRV"
          cmake -S . -B _build -G "Visual Studio 17 2022" -A x64 ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DRV_DEPS_QT5_LOCATION=C:/Qt/5.15.2/msvc2019_64 ^
            -DRV_FLEX_MINOR_VERSION=6 ^
            -DRV_MU_FLEX_APPLE=FALSE

      - name: Build OpenRV
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cd /d "%GITHUB_WORKSPACE%\OpenRV"
          cmake --build _build --config Release --parallel 4 --target main_executable

      - name: Show staged executables
        if: always()
        shell: pwsh
        run: |
          Get-ChildItem "$env:GITHUB_WORKSPACE\OpenRV\_build" -Filter *.exe -Recurse -ErrorAction SilentlyContinue |
            Select-Object FullName, Length

      - name: Package staged application
        shell: pwsh
        run: |
          $build = "$env:GITHUB_WORKSPACE\OpenRV\_build"
          $stage = Join-Path $build "stage"
          if (!(Test-Path $stage)) { throw "OpenRV stage directory not found: $stage" }
          Compress-Archive -Path "$stage\*" -DestinationPath "$env:GITHUB_WORKSPACE\OpenRV-3.2.0-Windows-x64.zip" -Force

      - name: Upload OpenRV package
        uses: actions/upload-artifact@v4
        with:
          name: OpenRV-3.2.0-Windows-x64
          path: OpenRV-3.2.0-Windows-x64.zip
          if-no-files-found: error
          retention-days: 7

